name: Tests
permissions:
  contents: read

on:
  pull_request:
    branches: [universe, main, develop]
  schedule:
    - cron: "0 2 * * *" # Daily at 2 AM

jobs:
  wordpress-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.2", "8.3"]
        wordpress: ["6.4", "latest"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@ec406be512d7077f68eed36e63f4d91bc006edc4
        with:
          php-version: ${{ matrix.php }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 8.6.0

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          composer install --no-interaction

      - name: Start WordPress ${{ matrix.wordpress }}
        run: |
          echo '{"core": "WordPress/WordPress#${{ matrix.wordpress }}", "phpVersion": "${{ matrix.php }}"}' > .wp-env.override.json
          pnpm run env:start

      - name: Run WordPress tests
        run: pnpm run test:wp

      - name: Run E2E tests
        run: |
          npx playwright install --with-deps chromium
          pnpm run test:e2e

      - name: Stop WordPress
        run: pnpm run env:stop
        if: always()

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run security audit
        run: |
          pnpm audit --audit-level=moderate
          composer audit
        continue-on-error: true

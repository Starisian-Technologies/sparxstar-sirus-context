name: Proof HTML, Lint JS & CSS

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Proof Frontend Assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install npm dependencies
        run: npm install --no-save
      - name: Lint JavaScript (check only)
        run: npm run lint:js
      - name: Lint CSS (check only)
        run: npm run lint:css
      - name: Proof HTML files
        uses: anishathalye/proof-html@v2
        with:
          directory: './'

  auto-fix:
    name: Auto-fix JS & CSS
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install npm dependencies
        run: npm install --no-save
      - name: Fix JavaScript and CSS issues
        run: |
          npm run lint:js:fix
          npm run lint:css:fix
      - name: Commit and push fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-fix JS/CSS lint issues'
          branch: ${{ github.head_ref }}
          file_pattern: 'src/js/**/*.js src/css/**/*.css'
